services:
  hubprofit:
    build: .
    ports:
      # Host port is configurable via HOST_PORT (defaults to 8000).
      # e.g. set HOST_PORT=8412 to browse at http://<host>:8412
      - "${HOST_PORT:-8000}:8000"
    volumes:
      - hubprofit_data:/data
    restart: unless-stopped
volumes:
  hubprofit_data:
